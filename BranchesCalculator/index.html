<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nirvana Branch Calculator</title>
<style>
  :root {
    --bg: #0f1115;
    --surface: #181a20;
    --surface2: #1e2028;
    --border: #2a2d36;
    --text: #e4e6eb;
    --text2: #8b8fa3;
    --accent: #6c72cb;
    --tier0: #22c55e;
    --tier1: #3b82f6;
    --tier2: #a855f7;
    --tier3: #f97316;
    --tier4: #ef4444;
    --tierLocked: #4a4d58;
    --radius: 6px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 20px 16px 40px; }
  h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: 0.02em; margin-bottom: 20px; color: var(--text); }
  h1 span { color: var(--accent); }

  .header { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .input-group { display: flex; flex-direction: column; gap: 4px; }
  .input-group label { font-size: 0.75rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; }
  .input-group input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .input-group input:focus { border-color: var(--accent); }

  .points-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .points-bar .pts { font-size: 1.1rem; font-weight: 600; }
  .points-bar .pts span { color: var(--accent); }
  .points-bar .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: var(--radius);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .btn:hover { background: var(--border); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: #5a60b5; }
  .btn-danger { border-color: var(--tier4); color: var(--tier4); }
  .btn-danger:hover { background: rgba(239,68,68,0.1); }
  .btn-warn { border-color: var(--tier3); color: var(--tier3); }
  .btn-warn:hover { background: rgba(249,115,22,0.1); }
  .btn-sm { padding: 4px 10px; font-size: 0.75rem; }
  .btn-sort { font-size: 0.7rem; padding: 4px 8px; min-width: 28px; text-align: center; }
  .btn-load-branches { border-color: var(--text2); color: var(--text2); font-size: 0.7rem; padding: 4px 8px; }
  .btn-load-branches:hover { background: var(--border); color: var(--text); }

  .tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .tab {
    padding: 8px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.15s;
    user-select: none;
  }
  .tab:hover { background: var(--surface2); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tab.wip { opacity: 0.6; }
  
  .no-branches-msg {
    text-align: center;
    padding: 40px;
    color: var(--text2);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
  }

  .sort-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .sort-bar .sort-label { font-size: 0.75rem; color: var(--text2); margin-right: 4px; }
  .sort-btn { font-size: 0.7rem; padding: 4px 10px; }
  .sort-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .progress-section { margin-bottom: 24px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text2); margin-bottom: 6px; }
  .progress-track {
    height: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s ease; }
  .progress-marks { display: flex; justify-content: space-between; margin-top: 4px; padding: 0 2px; }
  .progress-marks span { font-size: 0.7rem; color: var(--text2); width: 0; text-align: center; position: relative; }
  .progress-marks span::before { content: ''; position: absolute; top: -8px; left: 50%; width: 1px; height: 4px; background: var(--border); }
  .progress-marks span.reached { color: var(--accent); }

  .upgrade-branch { display: flex; align-items: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .stat-info { font-size: 0.8rem; color: var(--text2); }
  .stat-info b { color: var(--text); }

  /* Updated Grid to Masonry/Columns */
  .skills-grid {
    column-count: 2;
    column-gap: 12px;
  }
  @media (max-width: 700px) {
    .skills-grid { column-count: 1; }
  }

  .skill-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    break-inside: avoid;
    display: inline-flex;
    width: 100%;
    flex-direction: column;
    transition: border-color 0.15s;
  }
  .skill-card.locked { opacity: 0.35; }
  .skill-card.tier0 { border-left: 3px solid var(--tier0); }
  .skill-card.tier1 { border-left: 3px solid var(--tier1); }
  .skill-card.tier2 { border-left: 3px solid var(--tier2); }
  .skill-card.tier3 { border-left: 3px solid var(--tier3); }
  .skill-card.tier4 { border-left: 3px solid var(--tier4); }
  .skill-card.free-skill { border-left: 3px solid var(--text2); }
  .skill-card.wip-card { border-left: 3px solid var(--tier3); }

  .skill-header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
  }
  .skill-header-row:hover { background: var(--surface2); }
  .skill-name { font-weight: 600; font-size: 0.9rem; }
  .tier-badge {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 3px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .tier-badge.t0 { background: rgba(34,197,94,0.15); color: var(--tier0); }
  .tier-badge.t1 { background: rgba(59,130,246,0.15); color: var(--tier1); }
  .tier-badge.t2 { background: rgba(168,85,247,0.15); color: var(--tier2); }
  .tier-badge.t3 { background: rgba(249,115,22,0.15); color: var(--tier3); }
  .tier-badge.t4 { background: rgba(239,68,68,0.15); color: var(--tier4); }
  .tier-badge.free { background: rgba(255,255,255,0.08); color: #aaa; }
  .tier-badge.wip { background: rgba(249,115,22,0.1); color: var(--tier3); }
  .tier-badge.locked { background: rgba(255,255,255,0.05); color: var(--tierLocked); }

  .skill-detail { padding: 0 14px 12px; display: none; }
  .skill-detail.open { display: block; }

  .skill-action-type { font-size: 0.75rem; color: var(--accent); margin-bottom: 6px; font-style: italic; }
  .skill-desc {
    font-size: 0.82rem;
    color: var(--text2);
    margin-bottom: 10px;
    white-space: pre-wrap;
    line-height: 1.45;
  }
  .skill-lock-msg { font-size: 0.75rem; color: var(--text2); font-style: italic; margin-bottom: 8px; }
  .skill-wip-msg { font-size: 0.75rem; color: var(--tier3); font-weight: 600; margin-bottom: 8px; }

  .skill-actions-bar {
    margin-top: auto;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .tier-selector { display: flex; gap: 4px; margin-top: 8px; }
  .tier-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
    flex-shrink: 0;
  }
  .tier-dot.t0.unlocked { border-color: var(--tier0); background: rgba(34,197,94,0.2); }
  .tier-dot.t1.unlocked { border-color: var(--tier1); background: rgba(59,130,246,0.2); }
  .tier-dot.t2.unlocked { border-color: var(--tier2); background: rgba(168,85,247,0.2); }
  .tier-dot.t3.unlocked { border-color: var(--tier3); background: rgba(249,115,22,0.2); }
  .tier-dot.t4.unlocked { border-color: var(--tier4); background: rgba(239,68,68,0.2); }

  #folderInput { display: none; }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: var(--radius);
    font-size: 0.85rem;
    transition: transform 0.25s ease;
    z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    .header { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <h1><span>N</span> Nirvana Branch Calculator</h1>

  <div class="header">
    <div class="input-group">
      <label>Уровень персонажа</label>
      <input type="number" id="playerLevel" min="1" max="20" value="1">
    </div>
    <div class="input-group">
      <label>Базовая характеристика</label>
      <input type="number" id="baseStat" min="1" max="30" value="10">
    </div>
    <div class="input-group">
      <label>Действие</label>
      <button class="btn btn-danger" onclick="resetAll()">Сбросить</button>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <!-- Tabs will be injected here -->
  </div>

  <div class="points-bar">
    <div class="pts">Очки: <span id="availablePts">0</span> / <span id="maxPts">0</span></div>
    <div class="actions">
      <button class="btn btn-load-branches" onclick="document.getElementById('folderInput').click()">Загрузить папку ветвей</button>
      <input type="file" id="folderInput" webkitdirectory directory onchange="handleFolderUpload(event)">
      <div class="v-sep" style="width:1px; height:20px; background:var(--border); margin: 0 8px;"></div>
      <button class="btn" onclick="saveJSON()">Сохранить JSON</button>
      <button class="btn" onclick="document.getElementById('buildFileInput').click()">Загрузить JSON</button>
      <input type="file" id="buildFileInput" accept=".json" onchange="loadJSON(event)" style="display:none">
      <button class="btn" onclick="exportText()">Копировать текст</button>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-label">
      <span>Уровень ветки</span>
      <span id="branchLevelDisplay">0 / 10</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-marks" id="progressMarks"></div>
    <div class="upgrade-branch">
      <button class="btn btn-primary" id="upgradeBranchBtn">+1 к ветке</button>
      <button class="btn btn-warn" id="downgradeBranchBtn">-1 к ветке</button>
      <div class="stat-info" id="statInfo"></div>
    </div>
  </div>

  <div class="sort-bar" id="sortBar"></div>

  <div class="skills-grid" id="skillsGrid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// --- DATA & STATE ---
var TIERS = ['Корень','Опытный','Мастер','Титан','Полубог'];
var TIER_CLASSES = ['t0','t1','t2','t3','t4'];
var TIER_CARD_CLASSES = ['tier0','tier1','tier2','tier3','tier4'];

// Default embedded data (Fallback if no folder is loaded)
var DEFAULT_BRANCHES = {

    ],

      {id:'navigator', name:'Навигатор Хаоса', freeLvl:0, action:'Бонусное действие + Реакция / Бонусное действие', tiers:[

        'В течении 6 секунд сложная местность не влияет на скорость перемещения,\nскорость перемещения увеличивается на 3 фута * модификатор интеллекта,\nдвижение не провоцирует атаки по возможности,\nвы можете использовать модификатор интеллекта для любых проверок связанных с передвижением',

      {id:'scan', name:'Сканирование Среды', unlockLvl:1, action:'Действие / Бонусное действие', tiers:[
        'Точная карта помещения в радиусе 30 футов, включая закрытые зоны, живых существ.',
        'Точная карта помещения в радиусе 40 футов, включая закрытые зоны, живых существ, скрытые проходы,\nэнергетические потоки и скрытые угрозы.\nВы получаете преимущество на все проверки, связанные с ориентацией, поиском,\nанализом архитектуры и обнаружением скрытых объектов в зоне сканирования.',
        'Точная карта помещения в радиусе 60 футов, включая закрытые зоны, живых существ, скрытые проходы,\nэнергетические потоки и скрытые угрозы.\nВы получаете преимущество на все проверки, связанные с ориентацией, поиском,\nанализом архитектуры и обнаружением скрытых объектов в зоне сканирования.\nВы видите текущее состояние всех живых существ (процент здоровья - здоров/ранен(хп<75%)/серьезно ранен(хп<50%)/при смерти(хп<25%)/без сознания(хп=0)/мертв(труп)).',

      {id:'prostheses', name:'Ментальные Протезы', wip:true, tiers:['Даёт слоты памяти в которые можно навсегда сохранять навыки или умения полученные через другие скиллы Хохмы','','','','']},
      {id:'akasha', name:'Индекс Акаши', wip:true, tiers:['Божественная форма, по аналогии с пространственным доспехом Нахемы и вездесущностью Хесед.','','','','']}
    ]
  }
};

var BRANCHES = {};
// Init with defaults
Object.assign(BRANCHES, JSON.parse(JSON.stringify(DEFAULT_BRANCHES)));

var state = {
  branch: 'hesed',
  playerLevel: 1,
  baseStat: 10,
  branchLevel: 0,
  skills: {},
  expandedCards: {},
  sortMode: 'unlock',
  sortInvert: false,
  useFolderData: false // Flag to indicate if folder data was loaded
};

// --- LOGIC ---

function handleFolderUpload(event) {
  var files = event.target.files;
  if (!files || files.length === 0) return;

  var newBranches = {};
  var loadedCount = 0;

  Array.from(files).forEach(function(file) {
    if (file.name.endsWith('.json')) {
      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var json = JSON.parse(e.target.result);
          if (validateBranchData(json)) {
            newBranches[json.id] = json;
            loadedCount++;
            // If all files processed, update BRANCHES
            if (loadedCount === files.length) {
              if (Object.keys(newBranches).length > 0) {
                BRANCHES = newBranches;
                state.branch = Object.keys(newBranches)[0]; // Select first loaded branch
                state.useFolderData = true;
                resetAll();
                showToast('Загружено ' + Object.keys(newBranches).length + ' ветвей');
              } else {
                showToast('Не найдено валидных ветвей');
              }
            }
          }
        } catch (err) {
          console.error('Error parsing file ' + file.name, err);
        }
      };
      reader.readAsText(file);
    }
  });
}

function validateBranchData(data) {
  // Basic validation structure
  if (!data.id || !data.name || !data.statName || !data.levels || !data.skills) return false;
  if (!Array.isArray(data.levels) || !Array.isArray(data.skills)) return false;
  // Check first level/skill structure briefly
  if (data.levels.length === 0) return false;
  return true;
}

function initState() {
  var branch = BRANCHES[state.branch];
  if (!branch) return;

  state.skills = {};
  state.expandedCards = {};
  branch.skills.forEach(function(sk) {
    state.skills[sk.id] = {unlocked: false, tier: -1, isFree: sk.freeLvl !== undefined};
  });
}

function getMaxPoints() {
  return Math.min(state.playerLevel, 20);
}

function calcEffectiveStat(branchKey, branchLvl) {
  var total = state.baseStat;
  var branch = BRANCHES[branchKey];
  if (!branch) return total;
  
  // Calculate bonus from levels 1 to branchLvl
  for (var i = 1; i <= branchLvl && i < branch.levels.length; i++) {
    var lv = branch.levels[i];
    if (!lv) continue;
    var bonus = lv.bonus || 0;
    
    total += bonus;
    
    // Cap at 20 for levels 1-8
    if (i <= 8 && total > 20) total = 20;
  }
  return total;
}

function isSkillFree(skillId) {
  var branch = BRANCHES[state.branch];
  if (!branch) return false;
  var sk = branch.skills.find(function(x){ return x.id === skillId; });
  return sk && sk.freeLvl !== undefined;
}

function getSpentPoints() {
  var spent = state.branchLevel;
  var vals = Object.keys(state.skills);
  vals.forEach(function(sid) {
    var s = state.skills[sid];
    if (s.tier < 0) return;
    var cost = 1 + s.tier;
    // Free skills only cost for tiers (tier 0 is free)
    if (isSkillFree(sid)) {
      cost = s.tier; 
      // If tier 0 (Root), cost is 0. Tier 1 (Experienced), cost is 1, etc.
    }
    spent += cost;
  });
  return spent;
}

function getUnlockLvlForSkill(skillId) {
  var branch = BRANCHES[state.branch];
  if (!branch) return 999;
  var sk = branch.skills.find(function(s){ return s.id === skillId; });
  if (!sk) return 999;
  if (sk.freeLvl !== undefined) return sk.freeLvl;
  if (sk.unlockLvl !== undefined) return sk.unlockLvl;
  return 999;
}

function canUpgradeBranch() {
  if (state.branchLevel >= 10) return {ok: false, reason: 'Максимальный уровень ветки'};
  if (getSpentPoints() >= getMaxPoints()) return {ok: false, reason: 'Недостаточно очков'};
  
  // Check for Level 9 and 10 requirements
  if (state.branchLevel >= 8) {
    var eff = calcEffectiveStat(state.branch, state.branchLevel);
    if (eff < 20) return {ok: false, reason: 'Требуется ' + BRANCHES[state.branch].statName + ' >= 20. Сейчас: ' + eff};
  }
  return {ok: true};
}

function canDowngradeBranch() {
  return state.branchLevel > 0;
}

function canUnlockSkill(skillId) {
  var s = state.skills[skillId];
  var branch = BRANCHES[state.branch];
  var sk = branch.skills.find(function(x){ return x.id === skillId; });
  if (!sk || sk.wip) return false;
  if (s.unlocked) return false;
  
  var ulvl = getUnlockLvlForSkill(skillId);
  if (state.branchLevel < ulvl) return false;
  
  // If it's a free skill at this level
  if (sk.freeLvl !== undefined && state.branchLevel >= sk.freeLvl) {
    return {ok: true, cost: 0};
  }
  
  if (getSpentPoints() >= getMaxPoints()) return {ok: false, reason: 'Недостаточно очков'};
  return {ok: true, cost: 1};
}

function canUpgradeTier(skillId) {
  var s = state.skills[skillId];
  var branch = BRANCHES[state.branch];
  var sk = branch.skills.find(function(x){ return x.id === skillId; });
  if (!sk || sk.wip) return false;
  if (!s.unlocked) return false;
  if (s.tier >= 4) return false;
  
  // Check branch level requirement for the next tier
  var nextTierIdx = s.tier + 1; // 1=Experienced, 2=Master...
  var lvlData = branch.levels.find(function(l){ return l.tierUnlock === nextTierIdx; });
  
  if (!lvlData) return {ok: false, reason: 'Требуется более высокий уровень ветки'};
  if (state.branchLevel < lvlData.lvl) return {ok: false, reason: 'Требуется уровень ветки ' + lvlData.lvl};
  
  if (getSpentPoints() >= getMaxPoints()) return {ok: false, reason: 'Недостаточно очков'};
  
  return {ok: true, cost: 1};
}

function getSortedSkills() {
  var branch = BRANCHES[state.branch];
  if (!branch) return [];
  var skills = branch.skills.slice();

  if (state.sortMode === 'unlock') {
    if (state.sortInvert) {
      skills.reverse();
    }
  } else if (state.sortMode === 'tier') {
    skills.sort(function(a, b) {
      var tierA = (state.skills[a.id] && state.skills[a.id].unlocked) ? state.skills[a.id].tier : -1;
      var tierB = (state.skills[b.id] && state.skills[b.id].unlocked) ? state.skills[b.id].tier : -1;
      if (state.sortInvert) {
        return tierA - tierB; // Ascending
      } else {
        return tierB - tierA; // Descending (Godlike first)
      }
    });
  }
  return skills;
}

function renderSortBar() {
  var bar = document.getElementById('sortBar');
  var html = '<span class="sort-label">Сортировка:</span>';

  html += '<button class="btn btn-sm btn-sort ' + (state.sortMode === 'unlock' && !state.sortInvert ? 'active' : '') + '" onclick="setSort(\'unlock\',false)">По открытию</button>';
  html += '<button class="btn btn-sm btn-sort ' + (state.sortMode === 'unlock' && state.sortInvert ? 'active' : '') + '" onclick="setSort(\'unlock\',true)">Инверт</button>';
  html += '<button class="btn btn-sm btn-sort ' + (state.sortMode === 'tier' && !state.sortInvert ? 'active' : '') + '" onclick="setSort(\'tier\',false)">По рангу</button>';
  html += '<button class="btn btn-sm btn-sort ' + (state.sortMode === 'tier' && state.sortInvert ? 'active' : '') + '" onclick="setSort(\'tier\',true)">Инверт</button>';

  bar.innerHTML = html;
}

function setSort(mode, invert) {
  state.sortMode = mode;
  state.sortInvert = invert;
  render();
}

function render() {
  var branch = BRANCHES[state.branch];

  var tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  
  if (!branch) {
    tabsEl.innerHTML = '<div class="no-branches-msg">Нет загруженных ветвей. Нажмите "Загрузить папку ветвей" чтобы добавить данные.</div>';
    return;
  }

  // Render Tabs
  Object.keys(BRANCHES).forEach(function(key) {
    var b = BRANCHES[key];
    var tab = document.createElement('div');
    tab.className = 'tab' + (key === state.branch ? ' active' : '') + (b.isWIP ? ' wip' : '');
    tab.textContent = b.name + (b.isWIP ? ' (в разработке)' : '');
    tab.onclick = function(){ switchBranch(key); };
    tabsEl.appendChild(tab);
  });

  // Points
  var maxP = getMaxPoints();
  var spent = getSpentPoints();
  document.getElementById('availablePts').textContent = Math.max(0, maxP - spent);
  document.getElementById('maxPts').textContent = maxP;

  // Inputs
  document.getElementById('playerLevel').value = state.playerLevel;
  document.getElementById('baseStat').value = state.baseStat;

  // Progress
  var fill = document.getElementById('progressFill');
  fill.style.width = (state.branchLevel / 10 * 100) + '%';
  document.getElementById('branchLevelDisplay').textContent = state.branchLevel + ' / 10';

  var marks = document.getElementById('progressMarks');
  marks.innerHTML = '';
  for (var i = 0; i <= 10; i++) {
    var span = document.createElement('span');
    span.textContent = i;
    if (i <= state.branchLevel) span.classList.add('reached');
    marks.appendChild(span);
  }

  var upBtn = document.getElementById('upgradeBranchBtn');
  var canUp = canUpgradeBranch();
  upBtn.disabled = !canUp.ok;
  upBtn.title = canUp.ok ? '' : canUp.reason;
  upBtn.onclick = upgradeBranch;

  var downBtn = document.getElementById('downgradeBranchBtn');
  downBtn.disabled = !canDowngradeBranch();
  downBtn.onclick = downgradeBranch;

  var eff = calcEffectiveStat(state.branch, state.branchLevel);
  document.getElementById('statInfo').innerHTML = branch.statName + ': <b>' + state.baseStat + '</b> -> <b>' + eff + '</b>';

  renderSortBar();

  var sortedSkills = getSortedSkills();
  var grid = document.getElementById('skillsGrid');
  grid.innerHTML = '';

  sortedSkills.forEach(function(skill) {
    var s = state.skills[skill.id];

    if (skill.wip) {
      var cardWip = document.createElement('div');
      cardWip.className = 'skill-card wip-card';
      var descWip = skill.tiers[0] || 'Нет описания';
      cardWip.innerHTML = '<div class="skill-header-row" onclick="toggleCard(\'' + skill.id + '\')"><div class="skill-name">' + escapeHtml(skill.name) + '</div><div class="tier-badge wip">в разработке</div></div><div class="skill-detail ' + (state.expandedCards[skill.id] ? 'open' : '') + '"><div class="skill-desc">' + escapeHtml(descWip) + '</div><div class="skill-wip-msg">Данные скоро появятся</div></div>';
      grid.appendChild(cardWip);
      return;
    }

    var ulvl = getUnlockLvlForSkill(skill.id);
    var available = state.branchLevel >= ulvl;

    // Auto-unlock free skills if condition met
    if (skill.freeLvl !== undefined && state.branchLevel >= skill.freeLvl && !s.unlocked) {
      s.unlocked = true;
      s.tier = 0;
    }

    var card = document.createElement('div');
    card.className = 'skill-card';

    var isLocked = !s.unlocked && !available;

    if (isLocked) {
      card.classList.add('locked');
    } else if (s.unlocked && s.tier >= 0) {
      card.classList.add(TIER_CARD_CLASSES[s.tier]);
    } else if (skill.freeLvl !== undefined) {
      card.classList.add('free-skill');
    }

    var badgeHTML = '';
    if (isLocked) {
      badgeHTML = '<div class="tier-badge locked">Закрыт</div>';
    } else if (s.unlocked && s.tier >= 0) {
      badgeHTML = '<div class="tier-badge ' + TIER_CLASSES[s.tier] + '">' + TIERS[s.tier] + '</div>';
    } else if (skill.freeLvl !== undefined) {
      badgeHTML = '<div class="tier-badge free">Дар ветки</div>';
    }

    var isExpanded = state.expandedCards[skill.id] === true;

    var headerHTML = '<div class="skill-header-row" onclick="toggleCard(\'' + skill.id + '\')"><div class="skill-name">' + escapeHtml(skill.name) + '</div>' + badgeHTML + '</div>';

    var detailHTML = '<div class="skill-detail ' + (isExpanded ? 'open' : '') + '">';

    if (isLocked) {
      detailHTML += '<div class="skill-lock-msg">Требуется уровень ветки ' + ulvl + '</div>';
    } else {
      var desc = s.unlocked && s.tier >= 0 ? skill.tiers[s.tier] : skill.tiers[0];
      var actionHTML = skill.action ? '<div class="skill-action-type">' + skill.action + '</div>' : '';

      detailHTML += actionHTML;
      detailHTML += '<div class="skill-desc">' + escapeHtml(desc) + '</div>';

      var dotsHTML = '<div class="tier-selector">';
      for (var t = 0; t < 5; t++) {
        var unlk = s.unlocked && t <= s.tier;
        dotsHTML += '<div class="tier-dot ' + TIER_CLASSES[t] + (unlk ? ' unlocked' : '') + '">' + (t+1) + '</div>';
      }
      dotsHTML += '</div>';

      var actionsBarHTML = '<div class="skill-actions-bar">';
      if (!s.unlocked) {
        var unlockCheck = canUnlockSkill(skill.id);
        if (unlockCheck && unlockCheck.ok) {
          if (unlockCheck.cost === 0) {
            actionsBarHTML += '<button class="btn btn-primary btn-sm" onclick="unlockSkill(\'' + skill.id + '\')">Открыть (бесплатно)</button>';
          } else {
            actionsBarHTML += '<button class="btn btn-primary btn-sm" onclick="unlockSkill(\'' + skill.id + '\')">Открыть: ' + unlockCheck.cost + ' очк.</button>';
          }
        } else {
          var r = (unlockCheck && unlockCheck.reason) ? ' - ' + unlockCheck.reason : '';
          actionsBarHTML += '<span class="skill-lock-msg">Требуется уровень ветки ' + ulvl + r + '</span>';
        }
      } else {
        var upCheck = canUpgradeTier(skill.id);
        if (upCheck && upCheck.ok) {
          actionsBarHTML += '<button class="btn btn-primary btn-sm" onclick="upgradeTier(\'' + skill.id + '\')">Улучшить: ' + upCheck.cost + ' очк.</button>';
        } else if (s.tier < 4) {
          var r2 = (upCheck && upCheck.reason) ? upCheck.reason : 'Улучшение недоступно';
          actionsBarHTML += '<span class="skill-lock-msg">' + r2 + '</span>';
        } else {
          actionsBarHTML += '<span class="skill-lock-msg" style="color:var(--tier4)">Максимальный ранг</span>';
        }

        if (s.tier > 0) {
          actionsBarHTML += '<button class="btn btn-warn btn-sm" onclick="downgradeTier(\'' + skill.id + '\')">Снизить ранг</button>';
        }
        actionsBarHTML += '<button class="btn btn-danger btn-sm" onclick="sellSkill(\'' + skill.id + '\')">Продать навык</button>';
      }
      actionsBarHTML += '</div>';

      detailHTML += dotsHTML + actionsBarHTML;
    }

    detailHTML += '</div>';

    card.innerHTML = headerHTML + detailHTML;
    grid.appendChild(card);
  });
}

function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
}

function switchBranch(key) {
  state.branch = key;
  initState();
  render();
}

function upgradeBranch() {
  var check = canUpgradeBranch();
  if (!check.ok) { showToast(check.reason); return; }
  state.branchLevel++;
  render();
}

function downgradeBranch() {
  if (state.branchLevel <= 0) return;
  state.branchLevel--;
  var branch = BRANCHES[state.branch];
  branch.skills.forEach(function(sk) {
    var s = state.skills[sk.id];
    if (!s.unlocked) return;
    var ulvl = getUnlockLvlForSkill(sk.id);
    if (state.branchLevel < ulvl) {
      s.unlocked = false;
      s.tier = -1;
    }
  });
  render();
}

function unlockSkill(id) {
  var check = canUnlockSkill(id);
  if (!check || !check.ok) return;
  state.skills[id].unlocked = true;
  state.skills[id].tier = 0;
  render();
}

function upgradeTier(id) {
  var check = canUpgradeTier(id);
  if (!check || !check.ok) {
    if (check && check.reason) showToast(check.reason);
    return;
  }
  state.skills[id].tier++;
  render();
}

function downgradeTier(id) {
  var s = state.skills[id];
  if (!s.unlocked || s.tier <= 0) return;
  s.tier--;
  render();
}

function sellSkill(id) {
  var s = state.skills[id];
  if (!s.unlocked) return;
  s.unlocked = false;
  s.tier = -1;
  render();
}

function toggleCard(id) {
  state.expandedCards[id] = !state.expandedCards[id];
  render();
}

function resetAll() {
  state.branchLevel = 0;
  // Ensure valid branch is selected
  if (!BRANCHES[state.branch] && Object.keys(BRANCHES).length > 0) {
    state.branch = Object.keys(BRANCHES)[0];
  }
  initState();
  render();
  showToast('Сброшено');
}

document.getElementById('playerLevel').addEventListener('input', function(e) {
  var val = parseInt(e.target.value);
  if (isNaN(val) || val < 1) val = 1;
  if (val > 20) val = 20;
  state.playerLevel = val;
  render();
});

document.getElementById('baseStat').addEventListener('input', function(e) {
  var val = parseInt(e.target.value);
  if (isNaN(val) || val < 1) val = 1;
  if (val > 30) val = 30;
  state.baseStat = val;
  render();
});

// === SAVE / LOAD ===
function saveJSON() {
  var data = {
    meta: {version: '1.0', branch: state.branch, exportedAt: new Date().toISOString()},
    player: {level: state.playerLevel, baseStat: state.baseStat},
    progress: {branchLevel: state.branchLevel, spentPoints: getSpentPoints(), maxPoints: getMaxPoints()},
    skills: state.skills,
    expanded: state.expandedCards,
    sortMode: state.sortMode,
    sortInvert: state.sortInvert
  };
  var blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'nirvana_' + state.branch + '_' + state.playerLevel + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Сохранено');
}

function loadJSON(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      if (!data.meta || !data.meta.branch || !BRANCHES[data.meta.branch]) {
        showToast('Неверный формат');
        return;
      }
      state.branch = data.meta.branch;
      state.playerLevel = data.player.level || 1;
      state.baseStat = data.player.baseStat || 10;
      state.branchLevel = data.progress.branchLevel || 0;
      state.skills = data.skills || {};
      state.expandedCards = data.expanded || {};
      state.sortMode = data.sortMode || 'unlock';
      state.sortInvert = data.sortInvert || false;
      
      var branch = BRANCHES[state.branch];
      if (branch) {
        branch.skills.forEach(function(sk) {
          if (!state.skills[sk.id]) {
            state.skills[sk.id] = {unlocked: false, tier: -1, isFree: sk.freeLvl !== undefined};
          }
        });
      }
      render();
      showToast('Загружено');
    } catch (err) {
      showToast('Ошибка чтения файла');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function exportText() {
  var branch = BRANCHES[state.branch];
  if (!branch) return;
  var text = 'ВЕТВЬ: ' + branch.name.toUpperCase() + '\n';
  text += 'Уровень персонажа: ' + state.playerLevel + '\n';
  text += 'Базовая ' + branch.statName + ': ' + state.baseStat + '\n';
  text += 'Уровень ветки: ' + state.branchLevel + '/10\n';
  text += 'Эффективная ' + branch.statName + ': ' + calcEffectiveStat(state.branch, state.branchLevel) + '\n';
  text += 'Очки: ' + (getMaxPoints() - getSpentPoints()) + ' / ' + getMaxPoints() + '\n\n';
  text += 'НАВЫКИ:\n';
  text += '-'.repeat(40) + '\n';
  branch.skills.forEach(function(skill) {
    if (skill.wip) return;
    var s = state.skills[skill.id];
    text += '\n' + skill.name + '\n';
    if (s.unlocked && s.tier >= 0) {
      text += '  Ранг: ' + TIERS[s.tier] + '\n';
      text += '  ' + skill.tiers[s.tier].replace(/\n/g, '\n  ') + '\n';
      if (skill.action) text += '  [' + skill.action + ']\n';
    } else {
      text += '  Не изучен\n';
    }
    text += '-'.repeat(40) + '\n';
  });
  navigator.clipboard.writeText(text).then(function(){ showToast('Скопировано'); }).catch(function(){ showToast('Не удалось скопировать'); });
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

// --- INIT ---
initState();
render();
</script>
</body>
</html>
